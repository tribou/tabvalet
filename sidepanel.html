<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TabValet</title>
  <style>
    :root {
      --bg-panel: hsl(240, 8%, 9%);
      --bg-sidebar: hsl(240, 5%, 7%);
      --border-color: hsla(0, 0%, 100%, 0.08);
      --text-active: hsl(0, 0%, 100%);
      --text-muted: hsl(240, 2%, 73%);
      --hover-bg: hsla(0, 0%, 100%, 0.05);
      --accent: hsl(210, 100%, 52%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-sidebar);
      color: var(--text-muted);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }



    /* Headers */
    .section-header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #636366;
      letter-spacing: 0.06em;
      padding: 8px 12px 2px 12px;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    /* Scrollable lists */
    .lists-wrapper {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* FULL-BLEED DROPAREA ZONE */
    .drop-zone {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 4px;
      background: transparent;
    }

    /* Empty pinned zone drop line */
    #pinned-zone.drag-over-empty {
      position: relative;
    }
    #pinned-zone.drag-over-empty::after {
      content: '';
      position: absolute;
      top: 0;
      left: 4px;
      right: 4px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      z-index: 10;
      box-shadow: 0 0 4px var(--accent);
    }

    #pinned-zone {
      padding-bottom: 4px;
    }

    /* Section Container */
    .section-container {
      display: flex;
      flex-direction: column;
      transition: background-color 0.15s ease;
      border-radius: 10px;
      margin: 4px 2px;
      padding-bottom: 6px;
    }

    /* Reduced opacity for the row currently being dragged */
    .tab-row.dragging {
      opacity: 0.4;
    }

    /* Target insertion line above/below the row to avoid clipping glow */
    .tab-row.drag-before,
    .tab-row.drag-after {
      overflow: visible;
    }

    /* Target insertion line above the row */
    .tab-row.drag-before::before {
      content: '';
      position: absolute;
      top: 0;
      left: 4px;
      right: 4px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      z-index: 10;
      box-shadow: 0 0 4px var(--accent);
    }

    /* Target insertion line below the row */
    .tab-row.drag-after::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 4px;
      right: 4px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      z-index: 10;
      box-shadow: 0 0 4px var(--accent);
    }

    /* Tab row styling */
    .tab-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 38px;
      padding: 0 10px 0 0; /* ZERO left padding to keep click target flush */
      border-radius: 8px;
      background: transparent;
      cursor: default;
      position: relative;
      overflow: hidden;
      transition: background 0.15s;
    }
    .tab-row:active {
      cursor: default;
    }
    .tab-row:hover {
      background: var(--hover-bg);
    }
    .tab-row.active {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-color);
      color: var(--text-active);
    }
    .tab-row.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 3px;
      background: var(--accent);
      border-radius: 0 4px 4px 0;
    }

    .tab-info {
      display: flex;
      align-items: center;
      height: 100%;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    /* Clickable Favicon button zone */
    .favicon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0 12px;
      transition: background 0.15s;
      cursor: default;
    }
    .tab-row:not(.navigated) .favicon-wrapper {
      padding-left: 10px;
      cursor: default;
    }
    .tab-row.navigated .favicon-wrapper {
      border-right: none;
      padding-left: 10px;
      margin-right: 8px;
      cursor: default;
    }
    .tab-row.navigated .favicon-wrapper:hover {
      background: var(--hover-bg);
    }

    .favicon-img {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }

    /* Arc Slash */
    .arc-slash {
      color: rgba(255, 255, 255, 0.3);
      font-weight: 400;
      font-size: 0.85rem;
      margin-right: 8px;
      user-select: none;
    }

    .tab-title {
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-muted);
      transition: color 0.15s;
    }
    .tab-row:hover .tab-title, .tab-row.active .tab-title {
      color: var(--text-active);
    }

    /* Close Button (Hidden unless hovered) */
    .close-btn {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: default;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
    }
    .tab-row:hover .close-btn {
      opacity: 0.7;
      visibility: visible;
      pointer-events: auto;
    }
    .close-btn:hover {
      opacity: 1 !important;
      background: rgba(255, 255, 255, 0.12);
    }

    /* CONTINUOUS DIVIDER WITH COMFORTABLE HOVER TARGET AND MARGINS */
    .section-divider {
      position: relative;
      height: 16px; /* High-height invisible hover box */
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 12px 4px 12px; /* Margin on left and right for style, bottom margin for space, no top margin */
      flex-shrink: 0;
      cursor: default;
    }
    .section-divider::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-color);
      pointer-events: none;
    }
    .section-divider::after {
      content: 'DRAG ABOVE TO PIN';
      position: absolute;
      background: var(--bg-sidebar);
      padding: 0 10px;
      font-size: 0.55rem;
      color: rgba(255, 255, 255, 0.25);
      font-weight: 700;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .section-divider:hover::after {
      opacity: 1;
    }

    /* Custom scrollbar */
    .lists-wrapper::-webkit-scrollbar {
      width: 4px;
    }
    .lists-wrapper::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  


  <div class="lists-wrapper">
    <div class="section-container" id="pinned-section">
      <!-- Pinned Header -->
      <div class="section-header">Pinned Tabs</div>
      
      <!-- Pinned drop area -->
      <div class="drop-zone" id="pinned-zone">
        <!-- Pinned items dynamically generated -->
      </div>
    </div>

    <!-- Marginless Separation Line -->
    <div class="section-divider"></div>

    <div class="section-container" id="temp-section">
      <!-- Temporary drop area -->
      <div class="drop-zone" id="temp-zone">
        <!-- Temporary open items dynamically generated -->
      </div>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
